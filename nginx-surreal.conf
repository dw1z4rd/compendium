# nginx config — SurrealDB WebSocket proxy
# Place in /etc/nginx/sites-available/surreal and symlink to sites-enabled/
#
# SurrealDB listens on 127.0.0.1:8000 (bind to localhost only — don't expose publicly)
# nginx terminates TLS and proxies the WebSocket upgrade.
#
# Get a cert first:
#   certbot --nginx -d surreal.ianhas.one

server {
    listen 443 ssl;
    server_name surreal.ianhas.one;

    ssl_certificate     /etc/letsencrypt/live/surreal.ianhas.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/surreal.ianhas.one/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # SurrealDB HTTP + WebSocket RPC endpoint
    location / {
        proxy_pass         http://127.0.0.1:8000;

        # WebSocket upgrade headers — required for SurrealDB's /rpc endpoint
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts — SurrealDB connections are persistent
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Don't buffer WebSocket frames
        proxy_buffering off;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name surreal.ianhas.one;
    return 301 https://$host$request_uri;
}
